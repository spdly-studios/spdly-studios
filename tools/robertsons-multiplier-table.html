
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:1.5rem 0 0;font-family:var(--font-sans)}
h2{font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:1.25rem}
.inputs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
.field label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}
.field input{width:100%;padding:7px 10px;font-size:14px;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);color:var(--color-text-primary)}
.field input:focus{outline:none;border-color:var(--color-border-primary)}
.btns{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
button{padding:7px 14px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-primary);cursor:pointer}
button:hover{background:var(--color-background-secondary)}
button.primary{background:#E6F1FB;color:#0C447C;border-color:#B5D4F4}
.badge{display:inline-block;font-size:12px;padding:3px 10px;border-radius:var(--border-radius-md);font-weight:500;margin-bottom:1rem}
.tbl-wrap{overflow-x:auto;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg)}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
thead tr{background:#E6F1FB}
thead th{padding:9px 10px;text-align:center;font-weight:500;color:#0C447C;border-bottom:0.5px solid #B5D4F4;font-size:12px}
tbody tr{border-bottom:0.5px solid var(--color-border-tertiary)}
tbody tr:last-child{border-bottom:none}
tbody tr.even{background:var(--color-background-secondary)}
tbody tr.odd{background:var(--color-background-primary)}
tbody tr.shift-row{opacity:0.82}
td{padding:7px 10px;text-align:center;vertical-align:middle;color:var(--color-text-primary)}
td.mono{font-family:var(--font-mono);font-size:12px;letter-spacing:0.05em}
td.action{text-align:left;font-size:12px;color:var(--color-text-secondary)}
td.step{font-weight:500;color:var(--color-text-primary)}
.f1{color:#0C447C;font-weight:500}
.f0{color:var(--color-text-tertiary)}
.sign-bit{color:#993C1D;font-weight:500}
.result-row td{background:#EAF3DE;font-weight:500;color:#27500A}
.result-row td.mono{font-family:var(--font-mono)}
.summary{margin-top:1rem;display:flex;gap:10px;flex-wrap:wrap}
.sum-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 14px;flex:1;min-width:120px}
.sum-card .lbl{font-size:12px;color:var(--color-text-secondary);margin-bottom:2px}
.sum-card .val{font-size:16px;font-weight:500;color:var(--color-text-primary);font-family:var(--font-mono)}
.err{color:var(--color-text-danger);font-size:13px;margin-bottom:1rem}
th:nth-child(1){width:6%}
th:nth-child(2){width:22%}
th:nth-child(3){width:8%}
th:nth-child(4){width:32%}
th:nth-child(5){width:32%}
footer{margin-top:1.5rem;padding:12px 0;border-top:0.5px solid var(--color-border-tertiary);text-align:center;font-size:12px;color:var(--color-text-tertiary)}
footer a{color:var(--color-text-secondary);text-decoration:none}
footer a:hover{color:var(--color-text-primary)}
</style>

<div class="wrap">
<h2>Robertson's two's complement — trace table</h2>
<div class="inputs">
  <div class="field"><label>Multiplier X (−128 to 127)</label><input type="number" id="xv" value="-13" min="-128" max="127"></div>
  <div class="field"><label>Multiplicand Y / M (−128 to 127)</label><input type="number" id="yv" value="11" min="-128" max="127"></div>
</div>
<div class="btns">
  <button class="primary" onclick="run()"><i class="ti ti-player-play" aria-hidden="true"></i> Generate table</button>
  <button onclick="se(7,6)">+7×+6</button>
  <button onclick="se(7,-6)">+7×−6</button>
  <button onclick="se(-7,6)">−7×+6</button>
  <button onclick="se(-7,-6)">−7×−6</button>
</div>
<div id="out"></div>
<footer>© <a href="https://spdly.is-a.dev" target="_blank">SpDly Studios</a></footer>
</div>

<script>
function se(x,y){document.getElementById('xv').value=x;document.getElementById('yv').value=y;run()}
function toBin8(n){if(n<0)n=256+n;return n.toString(2).padStart(8,'0')}
function twosComp(b){let inv='';for(let c of b)inv+=(c==='0'?'1':'0');return addBin(inv,'1').padStart(b.length,'0')}
function addBin(a,b){let r='',c=0,l=Math.max(a.length,b.length)+1;a=a.padStart(l,'0');b=b.padStart(l,'0');for(let i=l-1;i>=0;i--){let s=+a[i]+ +b[i]+c;r=(s%2)+r;c=Math.floor(s/2)}return r.replace(/^0+/,'')||'0'}
function subBin(a,b){let l=Math.max(a.length,b.length)+2;a=a.padStart(l,'0');b=b.padStart(l,'0');let inv='';for(let c of b)inv+=(c==='0'?'1':'0');let tc=addBin(inv,'1').padStart(l,'0').slice(-l);return addBin(a,tc).padStart(l,'0').slice(-l)}
function binToInt(b){if(b[0]==='1'){return -parseInt(twosComp(b),2)}return parseInt(b,2)}
function fmtBits(bits,len){const b=bits.padStart(len,'0');return `<span class="sign-bit">${b[0]}</span>${b.slice(1)}`}

function run(){
  const xv=parseInt(document.getElementById('xv').value);
  const yv=parseInt(document.getElementById('yv').value);
  const out=document.getElementById('out');
  if(isNaN(xv)||isNaN(yv)||xv<-128||xv>127||yv<-128||yv>127){
    out.innerHTML='<p class="err">Enter integers between −128 and 127.</p>';return;
  }
  const x7=(xv<0)?1:0,y7=(yv<0)?1:0;
  let cN,cL,cC;
  if(x7===0&&y7===0){cN=1;cL='Case 1 — both positive';cC='style="background:#E6F1FB;color:#0C447C;border-color:#B5D4F4"'}
  else if(x7===0&&y7===1){cN=2;cL='Case 2 — X positive, Y negative';cC='style="background:#EAF3DE;color:#27500A;border-color:#C0DD97"'}
  else if(x7===1&&y7===0){cN=3;cL='Case 3 — X negative, Y positive';cC='style="background:#FAEEDA;color:#633806;border-color:#FAC775"'}
  else{cN=4;cL='Case 4 — both negative';cC='style="background:#FAECE7;color:#712B13;border-color:#F5C4B3"'}

  const xBin=toBin8(xv);
  const yBin=toBin8(yv);
  const xBits=xBin.split('').map(Number);

  let rows=[];
  let A='00000000';
  let Q=xBin;

  rows.push({step:0,action:'Initialize registers',F:'—',A:A,Q:Q,note:''});

  for(let i=0;i<8;i++){
    const q0=parseInt(Q[7]);
    const isCorrection=(i===7&&(cN===3||cN===4));
    let newA=A;

    if(isCorrection){
      const actionLabel=q0===1?'Subtract M from A (correction)':'No correction (Q[0]=0)';
      if(q0===1){
        const aFull=A.padStart(9,'0');
        const yFull=yBin.padStart(9,'0');
        newA=subBin(aFull,yFull).padStart(9,'0').slice(-8);
      }
      rows.push({step:i+1,action:actionLabel,F:q0===1?'C':'0',A:newA,Q:Q,note:'correction',isSub:q0===1});
      A=newA;
    } else {
      const doAdd=q0===1;
      if(doAdd){
        const aFull=A.padStart(9,'0');
        const yFull=yBin.padStart(9,'0');
        newA=addBin(aFull,yFull).padStart(9,'0').slice(-8);
        rows.push({step:i+1,action:'Add M to A',F:'1',A:newA,Q:Q,note:'add',isAdd:true});
        A=newA;
      } else {
        rows.push({step:i+1,action:'Add 0 to A',F:'0',A:A,Q:Q,note:'nop',isAdd:false});
      }
      const fullAQ=A+Q;
      const msb=(cN===1)?'0':A[0];
      const shifted=msb+fullAQ.slice(0,15);
      A=shifted.slice(0,8);Q=shifted.slice(8,16);
      rows.push({step:i+1,action:'Right-shift F.A.Q',F:doAdd?'1':'0',A:A,Q:Q,note:'shift'});
    }
  }

  const productBin=(A+Q.slice(0,8)).padStart(16,'0');
  const finalVal=binToInt(A+Q.slice(0,8));
  const exact=xv*yv;

  let html=`<span class="badge" ${cC}>${cL}</span>`;
  html+=`<div class="tbl-wrap"><table>
  <thead><tr>
    <th>Step</th><th>Action</th><th>F</th><th>Accumulator A</th><th>Register Q</th>
  </tr></thead><tbody>`;

  let rowIdx=0;
  for(let r of rows){
    const cls=rowIdx%2===0?'even':'odd';
    const shiftCls=r.note==='shift'?' shift-row':'';
    const corrCls=r.note==='correction'?' result-row':'';
    const stepCell=(r.note==='shift'||r.note==='correction')?'':r.step;
    const fCell=r.F==='—'?`<span style="color:var(--color-text-tertiary)">—</span>`
      :r.F==='1'?`<span class="f1">1</span>`
      :r.F==='C'?`<span style="color:#993C1D;font-weight:500">C</span>`
      :`<span class="f0">0</span>`;
    html+=`<tr class="${cls}${shiftCls}${corrCls}">
      <td class="step">${stepCell===0?0:(stepCell||'')}</td>
      <td class="action">${r.action}</td>
      <td>${fCell}</td>
      <td class="mono">${fmtBits(r.A,8)}</td>
      <td class="mono">${fmtBits(r.Q,8)}</td>
    </tr>`;
    rowIdx++;
  }

  html+=`<tr class="result-row">
    <td colspan="2" style="text-align:left;font-size:12px;font-weight:500">Final product (A · Q upper 8 bits)</td>
    <td>—</td>
    <td class="mono">${fmtBits(A,8)}</td>
    <td class="mono">${fmtBits(Q,8)}</td>
  </tr>`;
  html+='</tbody></table></div>';

  html+=`<div class="summary">
    <div class="sum-card"><div class="lbl">X (multiplier)</div><div class="val">${toBin8(xv)}</div></div>
    <div class="sum-card"><div class="lbl">Y / M (multiplicand)</div><div class="val">${toBin8(yv)}</div></div>
    <div class="sum-card"><div class="lbl">Product (16-bit)</div><div class="val" style="font-size:13px">${productBin}</div></div>
    <div class="sum-card"><div class="lbl">Result</div><div class="val" style="font-family:var(--font-sans)">${finalVal} ${finalVal===exact?'<span style="color:var(--color-text-success);font-size:12px">✓</span>':'<span style="color:var(--color-text-danger);font-size:12px">⚠</span>'}</div></div>
  </div>`;

  out.innerHTML=html;
}
run();
</script>
