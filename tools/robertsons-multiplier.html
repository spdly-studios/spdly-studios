<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robertson's Two's Complement Multiplier</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:1.5rem 0 0;font-family:var(--font-sans)}
h2{font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:.5rem}
.logic-box{font-size:12px;color:var(--color-text-secondary);margin-bottom:1rem;padding:8px 12px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-secondary)}
.logic-box b{color:var(--color-text-primary)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
.field label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}
.field input{width:100%;padding:7px 10px;font-size:14px;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);color:var(--color-text-primary)}
.field input:focus{outline:none;border-color:var(--color-border-primary)}
.btns{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
button{padding:7px 14px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-primary);cursor:pointer}
button:hover{background:var(--color-background-secondary)}
button.primary{background:#E6F1FB;color:#0C447C;border-color:#B5D4F4}
.badge{display:inline-block;font-size:12px;padding:3px 10px;border-radius:var(--border-radius-md);font-weight:500;margin-bottom:1rem}
.tbl-wrap{overflow-x:auto;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);margin-bottom:1rem}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:#E6F1FB}
thead th{padding:8px 10px;text-align:center;font-weight:500;color:#0C447C;border-bottom:0.5px solid #B5D4F4;font-size:11px;white-space:nowrap}
tbody tr{border-bottom:0.5px solid var(--color-border-tertiary)}
tbody tr:last-child{border-bottom:none}
.even{background:var(--color-background-secondary)}
.odd{background:var(--color-background-primary)}
.shift-row{opacity:0.82}
td{padding:7px 8px;text-align:center;vertical-align:middle;color:var(--color-text-primary);font-size:12px}
td.left{text-align:left;font-size:11px}
.mono{font-family:var(--font-mono);font-size:11px;letter-spacing:0.06em}
.sb{color:#993C1D;font-weight:500}
.f1{color:#0C447C;font-weight:500}
.f0{color:var(--color-text-tertiary)}
.fc{color:#993C1D;font-weight:500}
.result-row td{background:#EAF3DE;font-weight:500;color:#27500A}
.summary{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1.5rem}
.sc{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 14px;flex:1;min-width:110px}
.sc .lbl{font-size:12px;color:var(--color-text-secondary);margin-bottom:2px}
.sc .val{font-size:13px;font-weight:500;color:var(--color-text-primary);font-family:var(--font-mono);word-break:break-all}
.err{color:var(--color-text-danger);font-size:13px;margin-bottom:1rem}
footer{margin-top:1.5rem;padding:12px 0;border-top:0.5px solid var(--color-border-tertiary);text-align:center;font-size:12px;color:var(--color-text-tertiary)}
footer a{color:var(--color-text-secondary);text-decoration:none}
footer a:hover{color:var(--color-text-primary)}
</style>
</head>
<body
<div class="wrap">
<h2>Robertson's two's complement multiplier — trace table</h2>
<div class="logic-box">
  <b>F := (M[7] AND Q[0]) OR F</b> &nbsp;|&nbsp;
  M[7] = <span id="lm7">—</span> &nbsp;
  Q[0] = <span id="lq0">—</span> &nbsp;
  Prev F = <span id="lfp">—</span>
</div>
<div class="row2">
  <div class="field"><label>Multiplicand Y / M (−128 to 127)</label><input type="number" id="mv" value="43" min="-128" max="127"></div>
  <div class="field"><label>Multiplier X (−128 to 127)</label><input type="number" id="qv" value="77" min="-128" max="127"></div>
</div>
<div class="btns">
  <button class="primary" onclick="run()"><i class="ti ti-player-play" aria-hidden="true"></i> Generate table</button>
  <button onclick="se(6,7)">6×7</button>
  <button onclick="se(-6,7)">−6×7</button>
  <button onclick="se(6,-7)">6×−7</button>
  <button onclick="se(-6,-7)">−6×−7</button>
  <button onclick="se(43,77)">43×77</button>
  <button onclick="se(11,-13)">11×−13</button>
</div>
<div id="out"></div>
<footer>© <a href="https://spdly.is-a.dev" target="_blank">SpDly Studios</a></footer>
</div>

<script>
function se(m,q){document.getElementById('mv').value=m;document.getElementById('qv').value=q;run()}

function b8(x){return((x&0xFF)>>>0).toString(2).padStart(8,'0')}
function tcToInt(s){
  const v=parseInt(s,2);
  return s[0]==='1'?v-(1<<s.length):v;
}
function fmt(s){
  return `<span class="mono"><span class="sb">${s[0]}</span>${s.slice(1)}</span>`;
}

function run(){
  const Mval=parseInt(document.getElementById('mv').value);
  const Qval=parseInt(document.getElementById('qv').value);
  const out=document.getElementById('out');

  if(isNaN(Mval)||isNaN(Qval)||Mval<-128||Mval>127||Qval<-128||Qval>127){
    out.innerHTML='<p class="err">Enter integers between −128 and 127.</p>';return;
  }

  let A=0, Q=Qval&0xFF, M=Mval&0xFF, F=0, count=0;
  const rows=[];

  rows.push({step:0,action:'Initialize registers',F:0,A:b8(A),Q:b8(Q),remark:'Multiplier X in Q, Multiplicand Y=M'});

  while(count<8){
    const q0=Q&1;
    const m7=(M>>7)&1;
    F=(m7&q0)|F;

    document.getElementById('lm7').textContent=m7;
    document.getElementById('lq0').textContent=q0;
    document.getElementById('lfp').textContent=F;

    if(count===7&&q0===1){
      A=(A-M)&0xFF;
      Q=Q&0xFE;
      rows.push({step:'—',action:'Subtract M from A (correction)',F,A:b8(A),Q:b8(Q),remark:'x₇=1 correction step',isSub:true});
      rows.push({step:'—',action:'Set Q[0] to 0',F,A:b8(A),Q:b8(Q),remark:'correction complete',isSub:true});
      count++;
    } else {
      if(q0) A=(A+M)&0xFF;
      rows.push({step:count+1,action:q0?'Add M to A':'Add 0 to A',F,A:b8(A),Q:b8(Q),remark:`m7=${m7}, q0=${q0}`});

      if(count!==7){
        const newF=F;
        const newA=((F<<7)|(A>>1))&0xFF;
        const newQ=((A&1)<<7|(Q>>1))&0xFF;
        A=newA; Q=newQ; F=newF;
        rows.push({step:count+1,action:'Right-shift F.A.Q',F,A:b8(A),Q:b8(Q),remark:'MSB filled with F',isShift:true});
      }
      count++;
    }
  }

  const productA=b8(A);
  const productQ=b8(Q).substring(0,7);
  const productFull=productA+productQ;
  const finalInt=tcToInt(productFull);
  const exact=Mval*Qval;
  const ok=finalInt===exact;

  rows.push({step:'—',action:'Result: P = A ∥ Q[7:1]',F,A:b8(A),Q:b8(Q),remark:`P = ${productA} ${productQ}`,isResult:true});

  const x7=(Qval<0)?1:0, y7=(Mval<0)?1:0;
  let cN,cL,cSty;
  if(!x7&&!y7){cN=1;cL='Case 1 — both positive';cSty='background:#E6F1FB;color:#0C447C;border:0.5px solid #B5D4F4'}
  else if(!x7&&y7){cN=2;cL='Case 2 — X positive, Y negative';cSty='background:#EAF3DE;color:#27500A;border:0.5px solid #C0DD97'}
  else if(x7&&!y7){cN=3;cL='Case 3 — X negative, Y positive';cSty='background:#FAEEDA;color:#633806;border:0.5px solid #FAC775'}
  else{cN=4;cL='Case 4 — both negative';cSty='background:#FAECE7;color:#712B13;border:0.5px solid #F5C4B3'}

  let html=`<div class="badge" style="${cSty}">${cL}</div>`;

  html+=`<div class="tbl-wrap"><table><thead><tr>
    <th>Step</th><th style="text-align:left">Action</th><th>F</th><th>Accumulator A</th><th>Register Q</th><th style="text-align:left">Remark</th>
  </tr></thead><tbody>`;

  let ri=0;
  for(const r of rows){
    const base=ri%2===0?'even':'odd';
    const extra=r.isShift?' shift-row':r.isResult||r.isSub?' result-row':'';
    const fCell=r.F===0?`<span class="f0">0</span>`:`<span class="f1">${r.F}</span>`;
    html+=`<tr class="${base}${extra}">
      <td>${r.step}</td>
      <td class="left">${r.action}</td>
      <td>${fCell}</td>
      <td>${fmt(r.A)}</td>
      <td>${fmt(r.Q)}</td>
      <td class="left" style="font-size:11px;color:var(--color-text-secondary)">${r.remark}</td>
    </tr>`;
    ri++;
  }
  html+='</tbody></table></div>';

  html+=`<div class="summary">
    <div class="sc"><div class="lbl">M (multiplicand Y)</div><div class="val">${b8(M)} (${Mval})</div></div>
    <div class="sc"><div class="lbl">X (multiplier)</div><div class="val">${b8(Qval&0xFF)} (${Qval})</div></div>
    <div class="sc"><div class="lbl">Product A∥Q[7:1]</div><div class="val">${productFull}</div></div>
    <div class="sc"><div class="lbl">Result</div><div class="val" style="font-family:var(--font-sans)">${finalInt} ${ok?'<span style="color:var(--color-text-success)">✓</span>':'<span style="color:var(--color-text-danger)">⚠ expected '+exact+'</span>'}</div></div>
  </div>`;

  out.innerHTML=html;
}
run();
</script>
</body>
</html>
