  <!-- ═══ TOOLS PAGE STYLES ═══ -->
  <style>
    .tools-section {
      margin-bottom: 4rem;
    }
    
    .tools-section-heading {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    
    .tools-section-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--text);
    }
    
    .tools-section-count {
      font-size: 0.75rem;
      color: var(--text-3);
      font-family: var(--mono);
      background: var(--surface-2);
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
    }
    
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.25rem;
      margin-bottom: 3rem;
    }
    
    .tool-card {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 1.75rem;
      transition: all 0.3s ease;
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
    }
    
    .tool-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-dark));
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .tool-card:hover {
      border-color: var(--accent);
      background: var(--surface-2);
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(229, 79, 77, 0.12);
    }
    
    .tool-card:hover::before {
      opacity: 1;
    }
    
    .tool-icon {
      width: 2.5rem;
      height: 2.5rem;
      background: var(--accent-dim);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      font-size: 1.25rem;
      flex-shrink: 0;
    }
    
    .tool-title {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      line-height: 1.3;
      color: var(--text);
    }
    
    .tool-description {
      font-size: 0.9rem;
      color: var(--text-2);
      margin-bottom: 1rem;
      flex: 1;
      line-height: 1.6;
    }
    
    .tool-field {
      display: inline-block;
      font-size: 0.68rem;
      color: var(--accent);
      font-family: var(--mono);
      background: var(--accent-dim);
      padding: 0.25rem 0.6rem;
      border-radius: 3px;
      margin-bottom: 0.75rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    
    .tool-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      padding-top: 1rem;
      border-top: 1px solid var(--border-sub);
      font-size: 0.8rem;
      color: var(--text-3);
    }
    
    .tool-badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.3rem 0.6rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-2);
    }
    
    .tool-link-icon {
      color: var(--accent);
      opacity: 0.6;
      transition: opacity 0.3s ease;
    }
    
    .tool-card:hover .tool-link-icon {
      opacity: 1;
    }
    
    .tools-empty {
      padding: 3rem 2rem;
      text-align: center;
      color: var(--text-3);
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--r-lg);
    }
    
    .tools-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    
    .filter-btn {
      padding: 0.5rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-2);
      cursor: pointer;
      font-family: var(--font);
      font-size: 0.85rem;
      transition: all 0.2s ease;
    }
    
    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    
    .filter-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
  </style>
